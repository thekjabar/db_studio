services:
  admin-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: dbdash-admin-frontend
    restart: unless-stopped
    ports:
      # SECURITY: loopback only. This is the operator portal — publishing it on
      # 0.0.0.0 served it to the whole internet in plaintext, bypassing
      # Cloudflare and TLS. nginx proxies to 127.0.0.1.
      - "127.0.0.1:${ADMIN_FRONTEND_PORT:-8081}:80"
    networks: [dbdash]

networks:
  dbdash:
    name: dbdash-net
    external: true
