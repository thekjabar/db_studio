services:
  admin-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: dbdash-admin-frontend
    restart: unless-stopped
    ports:
      - "${ADMIN_FRONTEND_PORT:-8081}:80"
    networks: [dbdash]

networks:
  dbdash:
    name: dbdash-net
    external: true
