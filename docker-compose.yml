services:
  db:
    image: postgres:17-alpine
    container_name: dbdash-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dbdash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dbdash}
      POSTGRES_DB: ${POSTGRES_DB:-dbdash}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dbdash} -d ${POSTGRES_DB:-dbdash}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [dbdash]

  redis:
    image: redis:7-alpine
    container_name: dbdash-redis
    restart: unless-stopped
    # AOF persistence so scheduled-job state survives a restart. Tune per
    # deployment; `everysec` is bullmq's recommended setting.
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [dbdash]

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dbdash-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-dbdash}:${POSTGRES_PASSWORD:-dbdash}@db:5432/${POSTGRES_DB:-dbdash}?schema=public
      # Allow both the Vite dev server (local pnpm dev) and the dockerized
      # frontend (served by nginx on FRONTEND_PORT). Comma-separated list
      # consumed by AppConfigService.frontendOrigins.
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173,http://localhost:${FRONTEND_PORT:-8080}}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required (32 bytes base64)}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-localhost}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      DEFAULT_STATEMENT_TIMEOUT_MS: ${DEFAULT_STATEMENT_TIMEOUT_MS:-30000}
      RATE_LIMIT_TTL_SEC: ${RATE_LIMIT_TTL_SEC:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_LOGIN_MAX: ${RATE_LIMIT_LOGIN_MAX:-10}
      TOTP_ISSUER: ${TOTP_ISSUER:-Dbdash}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      OAUTH_CALLBACK_BASE_URL: ${OAUTH_CALLBACK_BASE_URL:-}
      OAUTH_SUCCESS_REDIRECT: ${OAUTH_SUCCESS_REDIRECT:-/auth/callback}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SCHEDULER_CONCURRENCY: ${SCHEDULER_CONCURRENCY:-4}
      SCHEDULER_QUERY_TIMEOUT_MS: ${SCHEDULER_QUERY_TIMEOUT_MS:-120000}
      SMTP_URL: ${SMTP_URL:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SLOW_QUERY_THRESHOLD_MS: ${SLOW_QUERY_THRESHOLD_MS:-1000}
      SLOW_QUERY_RETENTION: ${SLOW_QUERY_RETENTION:-10000}
    entrypoint: ["/usr/bin/tini", "--", "sh", "-c", "node_modules/.bin/prisma migrate deploy && exec node dist/main.js"]
    ports:
      - "${API_PORT:-3000}:3000"
    networks: [dbdash]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the bundle at build time. `/api` routes through nginx to
        # the api container, no CORS needed. Override for a split origin.
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: dbdash-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks: [dbdash]

volumes:
  db_data:
  redis_data:

networks:
  dbdash:
    driver: bridge
