# Add these two blocks to the HOST nginx server{} that serves queryschema.com
# (the same server block that already proxies / to dbdash-frontend). Then
# `nginx -t && systemctl reload nginx`.
#
# qs-v2-web (compose) publishes 127.0.0.1:8090 and internally serves the /v2
# SPA + proxies /v2/api to qs-v2-api. So the host only needs to forward /v2/.

location /v2/ {
    proxy_pass http://127.0.0.1:8090;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}

location = /v2 { return 301 /v2/; }
