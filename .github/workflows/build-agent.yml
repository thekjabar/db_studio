name: Build agent binaries

# Builds the DB Studio local agent for Windows + macOS (and Linux console).
# macOS binaries can only be produced on a real Mac, which GitHub provides here.
# Trigger manually (workflow_dispatch) or on pushes that touch agent/.
on:
  push:
    paths:
      - 'agent/**'
      - '.github/workflows/build-agent.yml'
  workflow_dispatch:

jobs:
  # ---- macOS: WebView2-equivalent (WebKit) window app, universal (arm64 + amd64) ----
  macos:
    runs-on: macos-14   # Apple Silicon runner; has Xcode + cc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build macOS agent (arm64 + amd64)
        working-directory: agent
        env:
          CGO_ENABLED: '1'
        run: |
          go mod download
          # webview_go uses WebKit on macOS via cgo (frameworks come with Xcode).
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o dist/agent-macos-arm64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o dist/agent-macos-amd64 .
          # Optional: a universal binary combining both (nice single download).
          lipo -create -output dist/agent-macos-universal dist/agent-macos-arm64 dist/agent-macos-amd64 || true
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: agent-macos
          path: |
            agent/dist/agent-macos-arm64
            agent/dist/agent-macos-amd64
            agent/dist/agent-macos-universal

  # ---- Windows: WebView2 window app (built on a Windows runner for parity) ----
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build Windows agent
        working-directory: agent
        env:
          CGO_ENABLED: '1'
        shell: bash
        run: |
          go mod download
          # -H=windowsgui => no console window, just the WebView2 app window.
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -H=windowsgui" -o dist/agent-windows-amd64.exe .
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: agent-windows
          path: agent/dist/agent-windows-amd64.exe

  # ---- Linux: pure-Go console build (no GUI toolkit) ----
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build Linux agent (console)
        working-directory: agent
        env:
          CGO_ENABLED: '0'
        run: |
          go mod download
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o dist/agent-linux-amd64 .
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: agent-linux
          path: agent/dist/agent-linux-amd64
