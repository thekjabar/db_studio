# Single-page app host with reverse-proxying to the API container.
# Routes:
#   /healthz      — nginx liveness probe
#   /api/*        — proxied to the `api` service (plain HTTP)
#   /socket.io/*  — WebSocket upgrade proxied to the `api` service
#   everything    — serves the built SPA, falling back to index.html so
#                   client-side routes (react-router) work on reload

upstream dbstudio_api {
    server api:3000;
}

server {
    listen 80;
    server_name _;

    # Disable server token disclosure.
    server_tokens off;

    # Generous upload size — CSV imports accept up to 50 MB.
    client_max_body_size 60m;

    # gzip static assets for a cheaper first paint.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    location = /healthz {
        default_type text/plain;
        return 200 'ok';
    }

    location /api/ {
        proxy_pass http://dbstudio_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Backups and pg_dump streams — give nginx enough headroom.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # Socket.IO — requires Upgrade + Connection headers for WebSocket.
    location /socket.io/ {
        proxy_pass http://dbstudio_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA fallback — serve the requested file if it exists, otherwise
    # index.html so client-side routes render correctly after reload.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        # Cache hashed Vite assets aggressively; index.html stays fresh.
        location ~* \.(js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        location = /index.html {
            add_header Cache-Control "no-store";
        }
    }
}
