# Admin SPA host. Same reverse-proxy pattern as the customer frontend but
# explicitly forbids the customer app's `/socket.io/` route so a stale URL
# can't mix the two. Mount at admin.yourservice.com in production.

upstream dbstudio_api {
    server api:3000;
}

server {
    listen 80;
    server_name _;

    server_tokens off;
    client_max_body_size 2m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    # Tell every search-engine crawler to go away — this subdomain is
    # internal-only. Defense in depth against accidental public indexing.
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    location = /healthz {
        default_type text/plain;
        return 200 'ok';
    }

    location /api/ {
        proxy_pass http://dbstudio_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    # No Socket.IO upgrade here on purpose: operator routes don't use it.
    location = /socket.io/ { return 404; }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        location ~* \.(js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        location = /index.html {
            add_header Cache-Control "no-store";
        }
    }
}
